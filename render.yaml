services:
  - type: web
    name: journal
    runtime: node
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: EMAIL
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
